<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #4f8ef7;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 12px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.offline { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .fps-badge {
      margin-left: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .fps-badge span { color: var(--accent); font-weight: 700; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    /* ── Cards ──────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }
    .card-header .badge {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 700;
    }
    .card-body { padding: 16px; }

    /* ── Stream ─────────────────────────────────────────────────── */
    #stream-wrapper {
      position: relative;
      background: #000;
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
      aspect-ratio: 4/3;
    }
    #stream-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    #stream-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* Detection flash */
    #detection-flash {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(239,68,68,.9);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      display: none;
      animation: flashin .2s ease;
    }
    @keyframes flashin { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    /* ── Events right column ─────────────────────────────────────── */
    .right-col { display: flex; flex-direction: column; gap: 16px; }

    /* Filter form */
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .filter-row input, .filter-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
      width: 100%;
    }
    .filter-row input:focus { outline: none; border-color: var(--accent); }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-danger    { background: var(--red);    color: #fff; }
    .btn-green     { background: var(--green);  color: #fff; }

    /* Events list */
    #events-list { max-height: 460px; overflow-y: auto; }
    .event-item {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background .15s;
    }
    .event-item:hover     { background: rgba(255,255,255,.03); }
    .event-item:last-child { border-bottom: none; }
    .event-thumb {
      width: 60px; height: 45px;
      object-fit: cover;
      border-radius: 4px;
      background: var(--bg);
    }
    .event-thumb-placeholder {
      width: 60px; height: 45px;
      background: var(--bg);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 18px;
    }
    .event-info .event-type {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .event-info .event-type.connection_restored { color: var(--green); }
    .event-info .event-ts {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .event-info .event-conf {
      font-size: 11px;
      color: var(--yellow);
    }
    #events-empty { padding: 24px; text-align: center; color: var(--muted); }

    /* ── Clip generator ──────────────────────────────────────────── */
    .clip-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .clip-row input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 12px;
      width: 100%;
    }
    #clip-link { display: none; color: var(--green); font-size: 12px; margin-top: 8px; text-decoration: underline; }

    /* ── Connectivity history ────────────────────────────────────── */
    #conn-history { max-height: 180px; overflow-y: auto; }
    .conn-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .conn-item:last-child { border-bottom: none; }
    .conn-status {
      font-weight: 700;
      min-width: 52px;
    }
    .conn-status.online  { color: var(--green); }
    .conn-status.offline { color: var(--red); }
    .conn-ts { color: var(--muted); }

    /* ── Scrollbar ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Ver Clipe button ────────────────────────────────────────── */
    .btn-clip {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 3px 8px;
      font-size: 10px;
      border-radius: 4px;
      margin-top: 5px;
    }
    .btn-clip:hover { background: var(--accent); color: #fff; opacity: 1; }

    /* ── Clip viewer modal ───────────────────────────────────────── */
    .clip-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .clip-modal-overlay.open { display: flex; }
    .clip-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      max-width: 760px;
      width: 92%;
    }
    .clip-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .clip-modal-header h3 { font-size: 14px; font-weight: 600; }
    .clip-modal-header .modal-actions { display: flex; gap: 8px; }
    #clip-modal-video {
      width: 100%;
      border-radius: 6px;
      background: #000;
      max-height: 440px;
      display: none;
    }
    .clip-modal-loading {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 13px;
    }
    .clip-modal-loading .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>🏠 House Monitor</h1>
    <div class="status-pill">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">verificando…</span>
    </div>
    <div class="status-pill">
      <div class="dot" id="cam-dot" style="background:var(--muted)"></div>
      <span id="cam-label">câmera</span>
    </div>
    <div class="fps-badge">FPS: <span id="fps-val">0</span></div>
  </header>

  <!-- Main grid -->
  <div class="main-grid">

    <!-- LEFT: stream + clip generator -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <!-- Live stream card -->
      <div class="card">
        <div class="card-header">
          Ao Vivo
          <span id="ws-status" style="font-size:11px;color:var(--muted)">conectando…</span>
        </div>
        <div id="stream-wrapper">
          <img id="stream-img" alt="stream" />
          <div id="stream-placeholder">Aguardando câmera…</div>
          <div id="detection-flash">🚨 Pessoa detectada!</div>
        </div>
      </div>

      <!-- Clip generator card -->
      <div class="card">
        <div class="card-header">Gerar Clipe MP4</div>
        <div class="card-body">
          <div class="clip-row">
            <div>
              <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Início</label>
              <input type="datetime-local" id="clip-start" />
            </div>
            <div>
              <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Fim</label>
              <input type="datetime-local" id="clip-end" />
            </div>
          </div>
          <div class="btn-row">
            <button class="btn-primary" onclick="buildClipLink()">Gerar link</button>
          </div>
          <a id="clip-link" target="_blank">⬇ Baixar clipe</a>
        </div>
      </div>

    </div>

    <!-- RIGHT: events + connectivity -->
    <div class="right-col">

      <!-- Events card -->
      <div class="card">
        <div class="card-header">
          Eventos
          <span class="badge" id="events-count">0</span>
        </div>
        <div class="card-body" style="padding-bottom:8px;">

          <!-- Filter -->
          <div class="filter-row">
            <div>
              <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">De</label>
              <input type="datetime-local" id="filter-start" />
            </div>
            <div>
              <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Até</label>
              <input type="datetime-local" id="filter-end" />
            </div>
          </div>
          <div class="btn-row">
            <button class="btn-primary" onclick="loadEvents()">Filtrar</button>
            <button class="btn-secondary" onclick="clearFilter()">Limpar</button>
          </div>
        </div>
        <div id="events-list">
          <div id="events-empty">Nenhum evento ainda.</div>
        </div>
      </div>

      <!-- Connectivity history card -->
      <div class="card">
        <div class="card-header">Histórico de Conectividade</div>
        <div class="card-body" style="padding:0 16px 0;">
          <div id="conn-history">
            <div style="padding:16px 0;color:var(--muted);font-size:12px;">Carregando…</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Clip viewer modal -->
  <div class="clip-modal-overlay" id="clip-modal-overlay" onclick="if(event.target===this)closeClipViewer()">
    <div class="clip-modal">
      <div class="clip-modal-header">
        <h3 id="clip-modal-title">Clipe do evento</h3>
        <div class="modal-actions">
          <a id="clip-modal-download" class="btn-secondary" style="padding:7px 14px;font-size:12px;font-weight:600;border-radius:6px;text-decoration:none;display:none" download>⬇ Baixar</a>
          <button class="btn-secondary" onclick="closeClipViewer()">✕ Fechar</button>
        </div>
      </div>
      <div id="clip-modal-loading" class="clip-modal-loading">
        <div class="spinner"></div><br>Gerando clipe…
      </div>
      <video id="clip-modal-video" controls></video>
    </div>
  </div>

  <script>
    // ── WebSocket ─────────────────────────────────────────────────
    let ws = null;
    let wsReconnectTimer = null;

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);

      ws.onopen = () => {
        document.getElementById('ws-status').textContent = 'conectado';
        document.getElementById('ws-status').style.color = 'var(--green)';
        clearTimeout(wsReconnectTimer);
      };

      ws.onclose = () => {
        document.getElementById('ws-status').textContent = 'desconectado';
        document.getElementById('ws-status').style.color = 'var(--red)';
        wsReconnectTimer = setTimeout(connectWs, 3000);
      };

      ws.onerror = () => {};

      ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        switch (msg.type) {
          case 'frame':       handleFrame(msg.data); break;
          case 'fps':         handleFps(msg.value);  break;
          case 'detection':   handleDetection(msg.event); break;
          case 'camera_status': handleCameraStatus(msg.status); break;
        }
      };
    }

    // ── Frame display ─────────────────────────────────────────────
    const streamImg = document.getElementById('stream-img');
    const placeholder = document.getElementById('stream-placeholder');
    let firstFrame = true;

    function handleFrame(base64) {
      if (firstFrame) {
        placeholder.style.display = 'none';
        streamImg.style.display = 'block';
        firstFrame = false;
        setCamStatus('online');
      }
      streamImg.src = 'data:image/jpeg;base64,' + base64;
    }

    function handleFps(value) {
      document.getElementById('fps-val').textContent = value;
    }

    // ── Detection notification ────────────────────────────────────
    let flashTimer = null;

    function handleDetection(event) {
      const flash = document.getElementById('detection-flash');
      flash.style.display = 'block';
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => { flash.style.display = 'none'; }, 4000);

      // Prepend event to the visible list without a full reload
      prependEventCard(event);
      updateEventsCount(1);
    }

    // ── Camera status ─────────────────────────────────────────────
    function setCamStatus(status) {
      const dot   = document.getElementById('cam-dot');
      const label = document.getElementById('cam-label');
      dot.style.background = status === 'online' ? 'var(--green)' : 'var(--red)';
      dot.style.boxShadow  = status === 'online' ? '0 0 6px var(--green)' : '0 0 6px var(--red)';
      label.textContent = status === 'online' ? 'câmera ok' : 'câmera off';
    }

    function handleCameraStatus(status) {
      if (status === 'disconnected') setCamStatus('offline');
    }

    // ── Connectivity status ───────────────────────────────────────
    function setConnStatus(status) {
      const dot   = document.getElementById('conn-dot');
      const label = document.getElementById('conn-label');
      dot.className = 'dot ' + status;
      label.textContent = status === 'online' ? 'online' : status === 'offline' ? 'offline' : 'verificando…';
    }

    // ── Events list ───────────────────────────────────────────────
    let _eventsCount = 0;

    function updateEventsCount(delta) {
      _eventsCount += delta;
      document.getElementById('events-count').textContent = _eventsCount;
    }

    function formatTs(ts) {
      return new Date(ts).toLocaleString('pt-BR', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    function buildEventCard(ev) {
      const item = document.createElement('div');
      item.className = 'event-item';
      item.dataset.id = ev.id;

      let thumbHtml;
      if (ev.snapshot_path) {
        thumbHtml = `<img class="event-thumb" src="/snapshots/event-${ev.id}.jpg" alt="snapshot"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="event-thumb-placeholder" style="display:none">📷</div>`;
      } else {
        thumbHtml = `<div class="event-thumb-placeholder">
          ${ev.type === 'connection_restored' ? '🔗' : '⚡'}
        </div>`;
      }

      const confHtml = ev.confidence
        ? `<div class="event-conf">conf: ${(ev.confidence * 100).toFixed(1)}%</div>`
        : '';

      const typeClass = ev.type.replace(/_/g, ' ') === 'connection_restored'
        ? 'connection_restored' : '';

      item.innerHTML = `
        ${thumbHtml}
        <div class="event-info">
          <div class="event-type ${typeClass}">${ev.type.replace(/_/g, ' ')}</div>
          <div class="event-ts">${formatTs(ev.timestamp)}</div>
          ${confHtml}
          <button class="btn-clip" onclick="openClipViewer('${ev.timestamp}')">▶ Ver Clipe</button>
        </div>`;
      return item;
    }

    function prependEventCard(ev) {
      const list = document.getElementById('events-list');
      const empty = document.getElementById('events-empty');
      if (empty) empty.remove();
      list.insertBefore(buildEventCard(ev), list.firstChild);
    }

    async function loadEvents() {
      const start  = document.getElementById('filter-start').value;
      const end    = document.getElementById('filter-end').value;

      let url = '/events?';
      if (start) url += `startTime=${encodeURIComponent(new Date(start).toISOString())}&`;
      if (end)   url += `endTime=${encodeURIComponent(new Date(end).toISOString())}&`;

      let events;
      try {
        const r = await fetch(url);
        events = await r.json();
      } catch { return; }

      const list = document.getElementById('events-list');
      list.innerHTML = '';
      _eventsCount = events.length;
      document.getElementById('events-count').textContent = _eventsCount;

      if (events.length === 0) {
        list.innerHTML = '<div id="events-empty">Nenhum evento encontrado.</div>';
        return;
      }

      const frag = document.createDocumentFragment();
      for (const ev of events) frag.appendChild(buildEventCard(ev));
      list.appendChild(frag);
    }

    function clearFilter() {
      document.getElementById('filter-start').value = '';
      document.getElementById('filter-end').value   = '';
      loadEvents();
    }

    // ── Connectivity history ──────────────────────────────────────
    async function loadConnectivity() {
      let data;
      try {
        const r = await fetch('/status');
        data = await r.json();
      } catch { return; }

      // Header connectivity dot
      setConnStatus(data.connectivity || 'unknown');

      // Camera status
      if (data.cameraRunning !== undefined) {
        setCamStatus(data.cameraRunning ? 'online' : 'offline');
      }

      const hist = data.connectivityHistory || [];
      const container = document.getElementById('conn-history');
      container.innerHTML = '';

      if (hist.length === 0) {
        container.innerHTML = '<div style="padding:12px 0;color:var(--muted);font-size:12px;">Sem registros.</div>';
        return;
      }

      for (const entry of hist) {
        const item = document.createElement('div');
        item.className = 'conn-item';
        item.innerHTML = `
          <span class="conn-status ${entry.status}">${entry.status.toUpperCase()}</span>
          <span class="conn-ts">${formatTs(entry.timestamp)}</span>`;
        container.appendChild(item);
      }
    }

    // ── Clip viewer modal ─────────────────────────────────────────
    const CLIP_DURATION_MS = 2 * 60 * 1000; // 2 minutes from event
    let _clipObjectUrl = null;

    async function openClipViewer(timestamp) {
      const start  = new Date(timestamp);
      const end    = new Date(start.getTime() + CLIP_DURATION_MS);
      const url    = `/clip?startTime=${encodeURIComponent(start.toISOString())}&endTime=${encodeURIComponent(end.toISOString())}`;

      const overlay  = document.getElementById('clip-modal-overlay');
      const video    = document.getElementById('clip-modal-video');
      const loading  = document.getElementById('clip-modal-loading');
      const title    = document.getElementById('clip-modal-title');
      const download = document.getElementById('clip-modal-download');

      title.textContent = `Clipe — ${formatTs(timestamp)}`;
      video.style.display = 'none';
      loading.style.display = 'block';
      loading.innerHTML = '<div class="spinner"></div><br>Gerando clipe…';
      download.style.display = 'none';
      overlay.classList.add('open');

      // Revoke any previous blob URL
      if (_clipObjectUrl) { URL.revokeObjectURL(_clipObjectUrl); _clipObjectUrl = null; }

      try {
        const res = await fetch(url);
        if (!res.ok) {
          let msg = `Erro ${res.status}`;
          try { const j = await res.json(); msg = j.error || msg; } catch { /* ignore */ }
          loading.innerHTML = `⚠ ${msg}`;
          return;
        }

        const blob = await res.blob();
        _clipObjectUrl = URL.createObjectURL(blob);
        video.src = _clipObjectUrl;
        loading.style.display = 'none';
        video.style.display = 'block';
        download.href = _clipObjectUrl;
        download.download = `clip-${Date.now()}.mp4`;
        download.style.display = 'inline-block';
        video.play().catch(() => {});
      } catch (err) {
        loading.innerHTML = `⚠ Falha ao carregar o clipe: ${err.message}`;
      }
    }

    function closeClipViewer() {
      const video = document.getElementById('clip-modal-video');
      video.pause();
      video.src = '';
      if (_clipObjectUrl) { URL.revokeObjectURL(_clipObjectUrl); _clipObjectUrl = null; }
      document.getElementById('clip-modal-overlay').classList.remove('open');
      document.getElementById('clip-modal-loading').innerHTML = '<div class="spinner"></div><br>Gerando clipe…';
      document.getElementById('clip-modal-video').style.display = 'none';
      document.getElementById('clip-modal-download').style.display = 'none';
    }

    // ── Clip ─────────────────────────────────────────────────────
    function buildClipLink() {
      const start = document.getElementById('clip-start').value;
      const end   = document.getElementById('clip-end').value;
      if (!start || !end) { alert('Selecione data/hora de início e fim.'); return; }
      const startIso = new Date(start).toISOString();
      const endIso   = new Date(end).toISOString();
      const url = `/clip?startTime=${encodeURIComponent(startIso)}&endTime=${encodeURIComponent(endIso)}`;
      const link = document.getElementById('clip-link');
      link.href = url;
      link.style.display = 'block';
    }

    // ── Init ──────────────────────────────────────────────────────
    connectWs();
    loadEvents();
    loadConnectivity();

    // Periodic refresh
    setInterval(loadConnectivity, 30000);  // connectivity every 30s
    setInterval(() => {
      // Only reload events if no filter is active
      const s = document.getElementById('filter-start').value;
      const e = document.getElementById('filter-end').value;
      if (!s && !e) loadEvents();
    }, 30000);
  </script>
</body>
</html>
